<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AR Portal — Babylon.js</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; font-family: monospace; }
    #renderCanvas { width: 100%; height: 100%; display: block; touch-action: none; }

    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 10;
    }
    #status {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.65); color: #7ee8a2; font-size: 12px;
      padding: 10px 20px; border-radius: 8px; letter-spacing: 0.05em;
      pointer-events: none; text-align: center; line-height: 1.8;
    }
    #startBtn {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8); border: 1px solid rgba(255,255,255,0.2);
      color: #fff; font-family: monospace; font-size: 14px;
      padding: 16px 36px; border-radius: 8px; cursor: pointer;
      letter-spacing: 0.08em; transition: background 0.2s;
      z-index: 20;
    }
    #startBtn:hover { background: rgba(40,40,40,0.95); }
    #startBtn.hidden { display: none; }
    #instructions {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.6); color: rgba(255,255,255,0.7);
      font-size: 11px; padding: 8px 18px; border-radius: 6px;
      letter-spacing: 0.05em; text-align: center; pointer-events: none;
      max-width: 320px; line-height: 1.7;
    }
    #markerHint {
      position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); color: rgba(255,200,80,0.9);
      font-size: 11px; padding: 6px 16px; border-radius: 6px;
      letter-spacing: 0.04em; pointer-events: none; display: none;
    }
  </style>
</head>
<body>

<canvas id="renderCanvas"></canvas>

<div id="overlay">
  <div id="instructions">
    Point your camera at the marker image.<br>
    Walk toward the portal to enter the virtual room.
  </div>
  <div id="markerHint">&#9432; No marker detected — scan the printed image</div>
</div>

<div id="status">initializing…</div>
<button id="startBtn">START AR SESSION</button>

<script src="https://cdn.babylonjs.com/babylon.js"></script>
<script src="https://cdn.babylonjs.com/babylonjs.materials.min.js"></script>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const CFG = {
  portalWidth:      0.80,   // metres
  portalHeight:     1.60,   // metres (door-sized)
  roomSize:         3.0,    // cube side length in metres
  enterThreshold:   0.55,   // metres — camera distance to trigger transition
  markerWidthM:     0.15,   // physical marker width in metres
  wallColors: {
    back:   new BABYLON.Color3(0.07, 0.12, 0.28),
    left:   new BABYLON.Color3(0.05, 0.09, 0.22),
    right:  new BABYLON.Color3(0.05, 0.09, 0.22),
    floor:  new BABYLON.Color3(0.03, 0.06, 0.15),
    ceil:   new BABYLON.Color3(0.08, 0.14, 0.30),
  },
  stencilRef: 1,
};

// ─── GLOBALS ───────────────────────────────────────────────────────────────
const canvas  = document.getElementById('renderCanvas');
const statusEl = document.getElementById('status');
const startBtn = document.getElementById('startBtn');
const markerHint = document.getElementById('markerHint');

let engine, scene, xrHelper;
let portalRoot, roomRoot;
let insidePortal = false;

// ─── ENGINE & SCENE ────────────────────────────────────────────────────────
function initEngine() {
  engine = new BABYLON.Engine(canvas, true, { stencil: true });
  scene  = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0, 0, 0, 0);

  // Ambient light for the virtual room
  const ambient = new BABYLON.HemisphericLight(
    'ambient', new BABYLON.Vector3(0, 1, 0), scene
  );
  ambient.intensity = 0.6;
  ambient.diffuse   = new BABYLON.Color3(0.5, 0.7, 1.0);

  // Point light inside the room
  const roomLight = new BABYLON.PointLight(
    'roomLight', new BABYLON.Vector3(0, 1.2, -0.5), scene
  );
  roomLight.intensity = 1.4;
  roomLight.diffuse   = new BABYLON.Color3(0.6, 0.8, 1.0);
  roomLight.range     = 6;

  buildPortal();

  engine.runRenderLoop(() => scene.render());
  window.addEventListener('resize', () => engine.resize());
}

// ─── PORTAL & ROOM ─────────────────────────────────────────────────────────
function buildPortal() {
  // Root transform — will be moved to the tracked marker pose each frame
  portalRoot = new BABYLON.TransformNode('portalRoot', scene);

  // ── 1. STENCIL MASK (door aperture) ──────────────────────────────────────
  // A flat plane the size of the door, rendered only into the stencil buffer.
  // Everything behind it (the room) is only shown where stencil == CFG.stencilRef.
  const maskMat = new BABYLON.StandardMaterial('maskMat', scene);
  maskMat.disableColorWrite       = true;   // invisible — only writes stencil
  maskMat.disableDepthWrite       = false;
  // Stencil: always pass, replace with ref value
  maskMat.stencil                 = true;
  maskMat.stencilMask             = 0xFF;
  maskMat.stencilFunc             = BABYLON.Engine.ALWAYS;
  maskMat.stencilOpStencilFail    = BABYLON.Engine.KEEP;
  maskMat.stencilOpDepthFail      = BABYLON.Engine.KEEP;
  maskMat.stencilOpStencilDepthPass = BABYLON.Engine.REPLACE;
  maskMat.stencilFuncRef          = CFG.stencilRef;
  maskMat.stencilFuncMask         = 0xFF;
  maskMat.backFaceCulling         = false;

  const aperture = BABYLON.MeshBuilder.CreatePlane('aperture', {
    width:  CFG.portalWidth,
    height: CFG.portalHeight,
    sideOrientation: BABYLON.Mesh.DOUBLESIDE,
  }, scene);
  aperture.material = maskMat;
  aperture.parent   = portalRoot;
  // Plane sits in XY, centre it vertically so bottom is at y=0 (floor)
  aperture.position.y = CFG.portalHeight / 2;
  aperture.renderingGroupId = 0;   // render stencil mask first

  // ── 2. DOOR FRAME ─────────────────────────────────────────────────────────
  const frameMat = new BABYLON.StandardMaterial('frameMat', scene);
  frameMat.emissiveColor  = new BABYLON.Color3(0.9, 0.35, 0.1);
  frameMat.disableLighting = true;
  frameMat.backFaceCulling = false;

  const frameThk = 0.035;
  const fW = CFG.portalWidth, fH = CFG.portalHeight;

  // Build frame from 4 boxes (top, bottom, left, right)
  const frameSegments = [
    { name: 'fTop',   w: fW + frameThk*2, h: frameThk, pos: [0, fH + frameThk/2, 0.001] },
    { name: 'fBot',   w: fW + frameThk*2, h: frameThk, pos: [0, -frameThk/2, 0.001] },
    { name: 'fLeft',  w: frameThk, h: fH,              pos: [-(fW/2 + frameThk/2), fH/2, 0.001] },
    { name: 'fRight', w: frameThk, h: fH,              pos: [fW/2 + frameThk/2, fH/2, 0.001] },
  ];
  frameSegments.forEach(seg => {
    const box = BABYLON.MeshBuilder.CreateBox(seg.name, {
      width: seg.w, height: seg.h, depth: frameThk * 0.5
    }, scene);
    box.material = frameMat;
    box.parent   = portalRoot;
    box.position = new BABYLON.Vector3(...seg.pos);
    box.renderingGroupId = 2;
  });

  // ── 3. VIRTUAL ROOM ────────────────────────────────────────────────────────
  roomRoot = new BABYLON.TransformNode('roomRoot', scene);
  roomRoot.parent   = portalRoot;
  roomRoot.position = new BABYLON.Vector3(0, CFG.portalHeight / 2, -CFG.roomSize / 2 + 0.01);

  const rs = CFG.roomSize;

  // Helper: single-sided interior panel
  function makeWall(name, w, h, pos, rot, color) {
    const mat = new BABYLON.StandardMaterial(name + 'Mat', scene);
    mat.emissiveColor   = color;
    mat.diffuseColor    = color;
    // Stencil: only render where stencil == ref (inside the portal aperture)
    mat.stencil             = true;
    mat.stencilMask         = 0xFF;
    mat.stencilFunc         = BABYLON.Engine.EQUAL;
    mat.stencilFuncRef      = CFG.stencilRef;
    mat.stencilFuncMask     = 0xFF;
    mat.stencilOpStencilFail    = BABYLON.Engine.KEEP;
    mat.stencilOpDepthFail      = BABYLON.Engine.KEEP;
    mat.stencilOpStencilDepthPass = BABYLON.Engine.KEEP;
    mat.backFaceCulling         = false;  // interior visible from inside

    const plane = BABYLON.MeshBuilder.CreatePlane(name, {
      width: w, height: h,
      sideOrientation: BABYLON.Mesh.FRONTSIDE,
    }, scene);
    plane.material        = mat;
    plane.parent          = roomRoot;
    plane.position        = new BABYLON.Vector3(...pos);
    plane.rotation        = new BABYLON.Vector3(...rot);
    plane.renderingGroupId = 1;  // after stencil mask, before frame
    return plane;
  }

  // Back wall
  makeWall('back',  rs, rs, [0, 0, -rs/2], [0, 0, 0], CFG.wallColors.back);
  // Front wall (behind camera when inside — open portal side)
  // Omit front wall so you can see out when inside
  // Left wall
  makeWall('left',  rs, rs, [-rs/2, 0, 0], [0, Math.PI/2, 0], CFG.wallColors.left);
  // Right wall
  makeWall('right', rs, rs, [rs/2,  0, 0], [0, -Math.PI/2, 0], CFG.wallColors.right);
  // Floor
  makeWall('floor', rs, rs, [0, -rs/2, 0], [Math.PI/2, 0, 0], CFG.wallColors.floor);
  // Ceiling
  makeWall('ceil',  rs, rs, [0, rs/2, 0],  [-Math.PI/2, 0, 0], CFG.wallColors.ceil);

  // ── 4. ROOM DETAILS ────────────────────────────────────────────────────────
  // Floating glowing orb in the room centre
  const orbMat = new BABYLON.StandardMaterial('orbMat', scene);
  orbMat.emissiveColor = new BABYLON.Color3(0.3, 0.7, 1.0);
  orbMat.stencil       = true;
  orbMat.stencilMask   = 0xFF;
  orbMat.stencilFunc   = BABYLON.Engine.EQUAL;
  orbMat.stencilFuncRef = CFG.stencilRef;
  orbMat.stencilFuncMask = 0xFF;
  orbMat.stencilOpStencilFail = BABYLON.Engine.KEEP;
  orbMat.stencilOpDepthFail   = BABYLON.Engine.KEEP;
  orbMat.stencilOpStencilDepthPass = BABYLON.Engine.KEEP;

  const orb = BABYLON.MeshBuilder.CreateSphere('orb', { diameter: 0.18 }, scene);
  orb.material = orbMat;
  orb.parent   = roomRoot;
  orb.position = new BABYLON.Vector3(0, 0.15, -rs * 0.35);
  orb.renderingGroupId = 1;

  // Animate the orb
  scene.registerBeforeRender(() => {
    orb.position.y = 0.15 + Math.sin(performance.now() * 0.001) * 0.12;
    orb.rotation.y += 0.01;
  });

  // Grid lines on the floor for depth cue
  addFloorGrid();
}

function addFloorGrid() {
  // Simple grid using line system, stencil-masked
  const gridMat = new BABYLON.StandardMaterial('gridMat', scene);
  gridMat.emissiveColor = new BABYLON.Color3(0.1, 0.25, 0.55);
  gridMat.stencil       = true;
  gridMat.stencilFunc   = BABYLON.Engine.EQUAL;
  gridMat.stencilFuncRef = CFG.stencilRef;
  gridMat.stencilFuncMask = 0xFF;
  gridMat.stencilMask   = 0xFF;
  gridMat.stencilOpStencilFail = BABYLON.Engine.KEEP;
  gridMat.stencilOpDepthFail   = BABYLON.Engine.KEEP;
  gridMat.stencilOpStencilDepthPass = BABYLON.Engine.KEEP;

  const rs = CFG.roomSize, step = 0.4, lines = [];
  for (let x = -rs/2; x <= rs/2; x += step) {
    lines.push([ new BABYLON.Vector3(x, -rs/2 + 0.005, -rs/2),
                 new BABYLON.Vector3(x, -rs/2 + 0.005,  rs/2) ]);
  }
  for (let z = -rs/2; z <= rs/2; z += step) {
    lines.push([ new BABYLON.Vector3(-rs/2, -rs/2 + 0.005, z),
                 new BABYLON.Vector3( rs/2, -rs/2 + 0.005, z) ]);
  }
  const lineSystem = BABYLON.MeshBuilder.CreateLineSystem('grid', { lines }, scene);
  lineSystem.color  = new BABYLON.Color3(0.1, 0.3, 0.7);
  lineSystem.parent = roomRoot;
  lineSystem.renderingGroupId = 1;
}

// ─── WEBXR SESSION ─────────────────────────────────────────────────────────
async function startAR() {
  startBtn.classList.add('hidden');
  setStatus('requesting AR session…');

  try {
    xrHelper = await scene.createDefaultXRExperienceAsync({
      uiOptions: { sessionMode: 'immersive-ar' },
      optionalFeatures: true,
    });

    const fm = xrHelper.baseExperience.featuresManager;

    // ── Image tracking ────────────────────────────────────────────────────
    let imageTracking = null;
    try {
      // Generate a simple marker image programmatically (checkerboard)
      const markerCanvas = document.createElement('canvas');
      markerCanvas.width = markerCanvas.height = 256;
      const mctx = markerCanvas.getContext('2d');
      drawCheckerboard(mctx, 256);
      const markerImg = new Image();
      markerImg.src = markerCanvas.toDataURL();
      await new Promise(r => { markerImg.onload = r; });

      imageTracking = fm.enableFeature(
        BABYLON.WebXRImageTracking.Name, 'latest', {
          images: [{ src: markerImg, estimatedRealWorldWidth: CFG.markerWidthM }]
        }
      );

      imageTracking.onTrackedImageUpdatedObservable.add(image => {
        if (image.transformationMatrix) {
          // Decompose the 4x4 tracking matrix into position + rotation
          const mat = BABYLON.Matrix.FromArray(image.transformationMatrix);
          const pos = new BABYLON.Vector3();
          const rot = new BABYLON.Quaternion();
          const scl = new BABYLON.Vector3();
          mat.decompose(scl, rot, pos);
          portalRoot.position         = pos;
          portalRoot.rotationQuaternion = rot;
          markerHint.style.display = 'none';
        }
      });

      imageTracking.onUntrackableImageFoundObservable.add(() => {
        markerHint.style.display = 'block';
      });

      setStatus('AR active — scan the marker image');
    } catch(e) {
      console.warn('Image tracking unavailable:', e);
      // Fallback: place portal 1.5m in front of camera on session start
      setStatus('Image tracking N/A — portal placed ahead');
      placePortalInFront();
    }

    // ── Per-frame: proximity check ─────────────────────────────────────────
    xrHelper.baseExperience.sessionManager.onXRFrameObservable.add(() => {
      const cam = xrHelper.baseExperience.camera;
      if (!cam || !portalRoot) return;

      const camPos    = cam.position;
      const portalPos = portalRoot.getAbsolutePosition().add(
        new BABYLON.Vector3(0, CFG.portalHeight / 2, 0)
      );
      const dist = BABYLON.Vector3.Distance(camPos, portalPos);

      if (!insidePortal && dist < CFG.enterThreshold) {
        enterPortal();
      } else if (insidePortal && dist > CFG.enterThreshold * 1.4) {
        exitPortal();
      }

      setStatus(
        `tracking: ${imageTracking ? 'active' : 'fallback'} | ` +
        `dist: ${dist.toFixed(2)}m | ` +
        `state: ${insidePortal ? 'inside ●' : 'outside ○'}`
      );
    });

    xrHelper.baseExperience.onStateChangedObservable.add(state => {
      if (state === BABYLON.WebXRState.NOT_IN_XR) {
        setStatus('session ended');
        startBtn.classList.remove('hidden');
      }
    });

  } catch (err) {
    console.error(err);
    setStatus('WebXR not available — running in desktop preview mode');
    startDesktopPreview();
  }
}

// ─── PORTAL TRANSITION ─────────────────────────────────────────────────────
function enterPortal() {
  insidePortal = true;
  // When inside, show the room without stencil restriction
  // (camera is now past the aperture — render everything)
  scene.meshes.forEach(m => {
    if (m.material && m.material.stencilFunc === BABYLON.Engine.EQUAL) {
      m.material.stencilFunc = BABYLON.Engine.ALWAYS;
    }
  });
  // Optionally fade the passthrough (if XR supports it)
  try {
    xrHelper.baseExperience.sessionManager.session.updateRenderState({
      // depthFar / depthNear adjustments for immersive feel
    });
  } catch(_) {}
}

function exitPortal() {
  insidePortal = false;
  scene.meshes.forEach(m => {
    if (m.material && m.material.stencilFunc === BABYLON.Engine.ALWAYS
        && m.name !== 'aperture' && !m.name.startsWith('f')) {
      m.material.stencilFunc = BABYLON.Engine.EQUAL;
    }
  });
}

// ─── FALLBACK: place portal 1.5 m ahead ────────────────────────────────────
function placePortalInFront() {
  if (!xrHelper) return;
  const cam = xrHelper.baseExperience.camera;
  if (!cam) return;
  const fwd = cam.getDirection(BABYLON.Vector3.Forward());
  portalRoot.position = cam.position.add(fwd.scale(1.5));
  portalRoot.position.y = 0;
  // Face toward camera
  portalRoot.lookAt(cam.position);
}

// ─── DESKTOP PREVIEW MODE ──────────────────────────────────────────────────
function startDesktopPreview() {
  // Free camera for desktop testing
  const camera = new BABYLON.ArcRotateCamera(
    'devCam', -Math.PI / 2, Math.PI / 3, 3, BABYLON.Vector3.Zero(), scene
  );
  camera.attachControl(canvas, true);
  camera.lowerRadiusLimit = 0.3;
  camera.upperRadiusLimit = 6;

  // Place portal at origin, facing camera
  portalRoot.position = new BABYLON.Vector3(0, 0, 0);
  portalRoot.rotation = new BABYLON.Vector3(0, 0, 0);

  // Simple gray environment
  const envMat = new BABYLON.StandardMaterial('env', scene);
  envMat.diffuseColor = new BABYLON.Color3(0.15, 0.15, 0.18);
  const ground = BABYLON.MeshBuilder.CreateGround('ground', { width: 10, height: 10 }, scene);
  ground.material = envMat;
  ground.position.y = 0;

  scene.clearColor = new BABYLON.Color4(0.08, 0.08, 0.1, 1);

  // Proximity check via pointer lock / camera distance
  scene.registerBeforeRender(() => {
    const dist = BABYLON.Vector3.Distance(
      camera.position,
      portalRoot.getAbsolutePosition().add(new BABYLON.Vector3(0, CFG.portalHeight/2, 0))
    );
    if (!insidePortal && dist < CFG.enterThreshold) enterPortal();
    else if (insidePortal && dist > CFG.enterThreshold * 1.4) exitPortal();
    setStatus(`desktop preview | dist: ${dist.toFixed(2)}m | ${insidePortal ? 'inside ●' : 'outside ○'}`);
  });

  setStatus('desktop preview — drag to orbit, scroll to zoom');
}

// ─── MARKER IMAGE GENERATOR ────────────────────────────────────────────────
// Draws a simple asymmetric checkerboard (suitable for image tracking)
function drawCheckerboard(ctx, size) {
  const cells = 8;
  const cell  = size / cells;
  for (let r = 0; r < cells; r++) {
    for (let c = 0; c < cells; c++) {
      ctx.fillStyle = (r + c) % 2 === 0 ? '#fff' : '#000';
      ctx.fillRect(c * cell, r * cell, cell, cell);
    }
  }
  // Asymmetric marker dot for orientation
  ctx.fillStyle = '#f00';
  ctx.beginPath();
  ctx.arc(cell * 1.5, cell * 1.5, cell * 0.4, 0, Math.PI * 2);
  ctx.fill();
  // Label
  ctx.fillStyle = '#333';
  ctx.font = `bold ${Math.floor(cell * 0.7)}px monospace`;
  ctx.textAlign = 'center';
  ctx.fillText('AR', size / 2, size / 2 + cell * 0.25);
}

// ─── STATUS HELPER ─────────────────────────────────────────────────────────
function setStatus(msg) {
  statusEl.textContent = msg;
}

// ─── PRINT MARKER BUTTON ───────────────────────────────────────────────────
// Inject a "print marker" link so users can get the image quickly
window.addEventListener('DOMContentLoaded', () => {
  const btn = document.createElement('button');
  btn.textContent = 'SAVE MARKER IMAGE';
  btn.style.cssText = `
    position: fixed; top: 16px; right: 16px; z-index: 30;
    background: rgba(0,0,0,0.75); color: #fff; border: 1px solid rgba(255,255,255,0.2);
    font-family: monospace; font-size: 11px; padding: 8px 14px;
    border-radius: 6px; cursor: pointer; letter-spacing: 0.06em;
  `;
  btn.onclick = () => {
    const c = document.createElement('canvas');
    c.width = c.height = 512;
    drawCheckerboard(c.getContext('2d'), 512);
    const a = document.createElement('a');
    a.href     = c.toDataURL('image/png');
    a.download = 'ar-portal-marker.png';
    a.click();
  };
  document.body.appendChild(btn);
});

// ─── BOOT ──────────────────────────────────────────────────────────────────
initEngine();
startBtn.addEventListener('click', startAR);
</script>
</body>
</html>
