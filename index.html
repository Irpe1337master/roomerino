<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>AR Portal</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:monospace; }

    #renderCanvas {
      position:fixed; inset:0; width:100%; height:100%;
      display:block; touch-action:none;
    }

    /* ── SPLASH ── */
    #splash {
      position:fixed; inset:0; z-index:200;
      background:#080810;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:32px 24px;
    }
    #splash h1 { font-size:24px; letter-spacing:0.2em; color:#fff; font-weight:400; margin-bottom:4px; }
    .sub { font-size:11px; color:rgba(255,255,255,0.28); letter-spacing:0.1em; margin-bottom:32px; }
    #markerPreview {
      width:156px; height:156px; border-radius:10px; margin-bottom:10px;
      border:1.5px solid rgba(255,255,255,0.14); image-rendering:pixelated; cursor:pointer;
    }
    .hint { font-size:11px; color:rgba(255,255,255,0.35); text-align:center; line-height:1.9; margin-bottom:32px; }
    #startBtn {
      width:100%; max-width:280px; padding:18px;
      font-size:15px; font-family:monospace; letter-spacing:0.12em;
      border-radius:12px; border:none; background:#fff; color:#000;
      cursor:pointer; font-weight:700; -webkit-appearance:none;
    }
    #startBtn:active { opacity:0.7; }
    #startBtn:disabled { opacity:0.28; cursor:default; }
    #errMsg { margin-top:14px; font-size:11px; color:rgba(255,90,90,0.85); text-align:center; line-height:1.8; display:none; }

    /* ── HUD (shown during AR) ── */
    #hud { position:fixed; inset:0; z-index:100; pointer-events:none; display:none; }

    #scanRing {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:180px; height:180px; border-radius:50%;
      border:1.5px solid rgba(255,255,255,0.3);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:14px;
      animation:pulse 2s ease-in-out infinite;
    }
    #scanRing svg { width:48px; height:48px; opacity:0.5; }
    #scanTxt { font-size:11px; color:rgba(255,255,255,0.45); letter-spacing:0.07em; }
    @keyframes pulse {
      0%,100% { transform:translate(-50%,-50%) scale(1);    border-color:rgba(255,255,255,0.3); }
      50%      { transform:translate(-50%,-50%) scale(1.07); border-color:rgba(255,255,255,0.6); }
    }

    #statusBar {
      position:absolute; bottom:max(24px, env(safe-area-inset-bottom));
      left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.6); color:rgba(100,240,150,0.9);
      font-size:11px; padding:9px 20px; border-radius:30px;
      letter-spacing:0.05em; white-space:nowrap; max-width:90vw;
    }

    #insideBadge {
      position:absolute; top:max(20px,env(safe-area-inset-top));
      left:50%; transform:translateX(-50%);
      color:rgba(150,210,255,0.9); font-size:12px; letter-spacing:0.1em; display:none;
    }

    #exitBtn {
      position:absolute;
      top:max(14px,env(safe-area-inset-top));
      right:max(14px,env(safe-area-inset-right));
      pointer-events:auto; background:rgba(0,0,0,0.55);
      border:1px solid rgba(255,255,255,0.2); color:#fff;
      font-family:monospace; font-size:12px; padding:11px 18px;
      border-radius:30px; cursor:pointer; letter-spacing:0.07em; -webkit-appearance:none;
    }
    #exitBtn:active { background:rgba(40,40,40,0.8); }
  </style>
</head>
<body>

<canvas id="renderCanvas"></canvas>

<div id="splash">
  <h1>AR PORTAL</h1>
  <p class="sub">babylon.js · webxr</p>
  <canvas id="markerPreview" width="256" height="256" title="Tap to download"></canvas>
  <p class="hint">Print this marker ~15 cm wide,<br>or show it on another screen.</p>
  <button id="startBtn" disabled>checking AR…</button>
  <p id="errMsg"></p>
</div>

<div id="hud">
  <div id="scanRing">
    <svg viewBox="0 0 48 48" fill="none">
      <rect x="4"  y="4"  width="12" height="3" fill="white"/>
      <rect x="4"  y="4"  width="3"  height="12" fill="white"/>
      <rect x="32" y="4"  width="12" height="3" fill="white"/>
      <rect x="41" y="4"  width="3"  height="12" fill="white"/>
      <rect x="4"  y="41" width="12" height="3" fill="white"/>
      <rect x="4"  y="32" width="3"  height="12" fill="white"/>
      <rect x="32" y="41" width="12" height="3" fill="white"/>
      <rect x="41" y="32" width="3"  height="12" fill="white"/>
    </svg>
    <span id="scanTxt">point at marker</span>
  </div>
  <div id="insideBadge">● INSIDE PORTAL</div>
  <div id="statusBar">starting…</div>
  <button id="exitBtn" onclick="endSession()">END AR</button>
</div>

<!-- Babylon core only — no extras needed -->
<script src="https://cdn.babylonjs.com/babylon.js"></script>

<script>
'use strict';

// ─── CONFIG ────────────────────────────────────────────────────────────────
const CFG = {
  portalW:   0.80,   // door width (m)
  portalH:   1.60,   // door height (m)
  roomSize:  3.0,    // virtual room cube (m)
  enterDist: 0.55,   // transition threshold (m)
  markerW:   0.15,   // printed marker physical width (m)
  stencilRef: 1,
};

// ─── STATE ─────────────────────────────────────────────────────────────────
let engine, scene, xrSession, xrRefSpace, xrLayer;
let portalRoot, orbMesh;
let insidePortal  = false;
let markerTracked = false;
let camPose       = null;  // latest XRViewerPose

// ─── DOM ───────────────────────────────────────────────────────────────────
const canvas       = document.getElementById('renderCanvas');
const splash       = document.getElementById('splash');
const startBtn     = document.getElementById('startBtn');
const errMsg       = document.getElementById('errMsg');
const hud          = document.getElementById('hud');
const scanRing     = document.getElementById('scanRing');
const scanTxt      = document.getElementById('scanTxt');
const statusBar    = document.getElementById('statusBar');
const insideBadge  = document.getElementById('insideBadge');
const markerCanvas = document.getElementById('markerPreview');

// ─── MARKER ────────────────────────────────────────────────────────────────
function drawMarker(ctx, n) {
  const cell = n / 8;
  for (let r = 0; r < 8; r++)
    for (let c = 0; c < 8; c++) {
      ctx.fillStyle = (r+c)%2===0 ? '#fff' : '#000';
      ctx.fillRect(c*cell, r*cell, cell, cell);
    }
  ctx.fillStyle='#f22'; ctx.beginPath();
  ctx.arc(cell*1.5, cell*1.5, cell*0.38, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle='#111'; ctx.font=`bold ${Math.round(cell*0.85)}px monospace`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText('AR', n/2, n/2);
}
drawMarker(markerCanvas.getContext('2d'), 256);
markerCanvas.addEventListener('click', () => {
  const c = document.createElement('canvas'); c.width = c.height = 512;
  drawMarker(c.getContext('2d'), 512);
  Object.assign(document.createElement('a'),
    {href:c.toDataURL('image/png'), download:'ar-portal-marker.png'}).click();
});

// ─── XR SUPPORT CHECK ──────────────────────────────────────────────────────
(async () => {
  if (!navigator.xr) { fail('WebXR not found. Use Chrome on Android over HTTPS.'); return; }
  try {
    if (await navigator.xr.isSessionSupported('immersive-ar')) {
      startBtn.disabled = false;
      startBtn.textContent = 'START AR';
    } else {
      fail('immersive-ar not supported.\nNeed Android + Chrome + ARCore.');
    }
  } catch(e) { fail('AR check failed — serve over HTTPS.'); }
})();

function fail(msg) {
  startBtn.disabled = true; startBtn.textContent = 'UNAVAILABLE';
  errMsg.style.display = 'block'; errMsg.textContent = msg;
}

// ─── BABYLON ENGINE (no XR helper — we drive it manually) ─────────────────
function initBabylon() {
  engine = new BABYLON.Engine(canvas, true, {
    stencil: true,
    alpha: true,                  // transparent so AR passthrough shows through
    antialias: true,
    preserveDrawingBuffer: true,
  });

  scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0, 0, 0, 0); // fully transparent bg

  // Lights
  const amb = new BABYLON.HemisphericLight('amb', new BABYLON.Vector3(0,1,0), scene);
  amb.intensity = 0.5; amb.diffuse = new BABYLON.Color3(0.4, 0.6, 1.0);

  const pt = new BABYLON.PointLight('pt', new BABYLON.Vector3(0,1.2,-0.5), scene);
  pt.intensity = 1.8; pt.diffuse = new BABYLON.Color3(0.5,0.75,1.0); pt.range = 5;

  // Plain UniversalCamera; transform is set from XR poses each frame
  const cam = new BABYLON.UniversalCamera('xrCam', BABYLON.Vector3.Zero(), scene);
  cam.minZ = 0.01; cam.maxZ = 100;
  scene.activeCamera = cam;

  buildPortal();
}

// ─── PORTAL GEOMETRY ───────────────────────────────────────────────────────
function mkStencilMat(name, color) {
  const m = new BABYLON.StandardMaterial(name, scene);
  m.emissiveColor = color; m.diffuseColor = color;
  m.backFaceCulling = false;
  m.stencil = true; m.stencilMask = 0xFF;
  m.stencilFunc = BABYLON.Engine.EQUAL;
  m.stencilFuncRef = CFG.stencilRef; m.stencilFuncMask = 0xFF;
  m.stencilOpStencilFail = BABYLON.Engine.KEEP;
  m.stencilOpDepthFail   = BABYLON.Engine.KEEP;
  m.stencilOpStencilDepthPass = BABYLON.Engine.KEEP;
  return m;
}

function buildPortal() {
  portalRoot = new BABYLON.TransformNode('portal', scene);
  portalRoot.position.y = -9999; // off-screen until marker found

  // ── Stencil aperture ──
  const aMat = new BABYLON.StandardMaterial('aMat', scene);
  aMat.disableColorWrite = true; aMat.backFaceCulling = false;
  aMat.stencil = true; aMat.stencilMask = 0xFF;
  aMat.stencilFunc = BABYLON.Engine.ALWAYS;
  aMat.stencilFuncRef = CFG.stencilRef; aMat.stencilFuncMask = 0xFF;
  aMat.stencilOpStencilFail = BABYLON.Engine.KEEP;
  aMat.stencilOpDepthFail   = BABYLON.Engine.KEEP;
  aMat.stencilOpStencilDepthPass = BABYLON.Engine.REPLACE;

  const ap = BABYLON.MeshBuilder.CreatePlane('ap',
    {width:CFG.portalW, height:CFG.portalH, sideOrientation:BABYLON.Mesh.DOUBLESIDE}, scene);
  ap.material = aMat; ap.parent = portalRoot;
  ap.position.y = CFG.portalH/2; ap.renderingGroupId = 0;

  // ── Frame ──
  const fMat = new BABYLON.StandardMaterial('fMat', scene);
  fMat.emissiveColor = new BABYLON.Color3(1.0,0.42,0.1); fMat.disableLighting = true;
  const ft=0.04, fW=CFG.portalW, fH=CFG.portalH;
  [{w:fW+ft*2,h:ft,  p:[0,fH+ft/2,0.003]},
   {w:fW+ft*2,h:ft,  p:[0,-ft/2,  0.003]},
   {w:ft,     h:fH,  p:[-(fW/2+ft/2),fH/2,0.003]},
   {w:ft,     h:fH,  p:[fW/2+ft/2,  fH/2,0.003]}
  ].forEach((s,i) => {
    const b = BABYLON.MeshBuilder.CreateBox('f'+i,
      {width:s.w,height:s.h,depth:ft*0.4},scene);
    b.material=fMat; b.parent=portalRoot;
    b.position=new BABYLON.Vector3(...s.p); b.renderingGroupId=2;
  });

  // ── Room ──
  const roomNode = new BABYLON.TransformNode('room', scene);
  roomNode.parent = portalRoot;
  roomNode.position = new BABYLON.Vector3(0, CFG.portalH/2, -(CFG.roomSize/2)+0.01);
  const rs = CFG.roomSize;
  const wallDefs = [
    {n:'back', rx:0,         ry:0,          pos:[0,0,-rs/2], c:new BABYLON.Color3(0.05,0.10,0.25)},
    {n:'left', rx:0,         ry:Math.PI/2,  pos:[-rs/2,0,0], c:new BABYLON.Color3(0.04,0.08,0.20)},
    {n:'rght', rx:0,         ry:-Math.PI/2, pos:[rs/2,0,0],  c:new BABYLON.Color3(0.04,0.08,0.20)},
    {n:'flor', rx:Math.PI/2, ry:0,          pos:[0,-rs/2,0], c:new BABYLON.Color3(0.02,0.05,0.14)},
    {n:'ceil', rx:-Math.PI/2,ry:0,          pos:[0,rs/2,0],  c:new BABYLON.Color3(0.07,0.12,0.28)},
  ];
  wallDefs.forEach(d => {
    const m = BABYLON.MeshBuilder.CreatePlane(d.n,
      {width:rs,height:rs,sideOrientation:BABYLON.Mesh.FRONTSIDE},scene);
    m.material = mkStencilMat(d.n+'M', d.c);
    m.parent = roomNode;
    m.position = new BABYLON.Vector3(...d.pos);
    m.rotation = new BABYLON.Vector3(d.rx, d.ry, 0);
    m.renderingGroupId = 1;
  });

  // Orb
  orbMesh = BABYLON.MeshBuilder.CreateSphere('orb',{diameter:0.18},scene);
  orbMesh.material = mkStencilMat('orbM', new BABYLON.Color3(0.3,0.75,1.0));
  orbMesh.parent = roomNode;
  orbMesh.position = new BABYLON.Vector3(0, 0.15, -rs*0.35);
  orbMesh.renderingGroupId = 1;

  // Floor grid
  const lines=[];
  for(let x=-rs/2;x<=rs/2+0.001;x+=0.4)
    lines.push([new BABYLON.Vector3(x,-rs/2+0.005,-rs/2),new BABYLON.Vector3(x,-rs/2+0.005,rs/2)]);
  for(let z=-rs/2;z<=rs/2+0.001;z+=0.4)
    lines.push([new BABYLON.Vector3(-rs/2,-rs/2+0.005,z),new BABYLON.Vector3(rs/2,-rs/2+0.005,z)]);
  const grid = BABYLON.MeshBuilder.CreateLineSystem('grid',{lines},scene);
  grid.color=new BABYLON.Color3(0.1,0.3,0.75); grid.parent=roomNode; grid.renderingGroupId=1;
}

// ─── START: raw WebXR session ──────────────────────────────────────────────
startBtn.addEventListener('click', async () => {
  startBtn.disabled=true; startBtn.textContent='starting…';
  initBabylon();

  // ── 1. Request XR session ──
  const sessionInit = {
    requiredFeatures: ['local-floor'],
    optionalFeatures: ['image-tracking', 'hit-test', 'dom-overlay'],
    domOverlay: { root: hud },
  };

  let markerBitmap = null;
  try {
    markerBitmap = await createImageBitmap(markerCanvas);
    sessionInit.trackedImages = [{
      image: markerBitmap,
      widthInMeters: CFG.markerW,
    }];
  } catch(e) {
    console.warn('createImageBitmap failed, skipping image-tracking:', e);
  }

  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', sessionInit);
  } catch(err) {
    console.warn('Session with image-tracking failed, retrying:', err);
    try {
      delete sessionInit.trackedImages;
      sessionInit.optionalFeatures = ['hit-test','dom-overlay'];
      xrSession = await navigator.xr.requestSession('immersive-ar', sessionInit);
      markerBitmap = null;
    } catch(err2) {
      splash.style.display='flex';
      startBtn.disabled=false; startBtn.textContent='START AR';
      fail('Could not start AR session:\n' + (err2.message||err2));
      return;
    }
  }

  // ── 2. Hook Babylon's GL context ──
  const gl = engine._gl;
  await gl.makeXRCompatible();

  xrLayer = new XRWebGLLayer(xrSession, gl, {
    antialias: true,
    alpha: true,
    depth: true,
    stencil: true,
  });
  await xrSession.updateRenderState({ baseLayer: xrLayer });

  // ── 3. Reference space ──
  try {
    xrRefSpace = await xrSession.requestReferenceSpace('local-floor');
  } catch(_) {
    xrRefSpace = await xrSession.requestReferenceSpace('local');
  }

  // ── 4. Image tracking setup ──
  let usingImageTracking = false;
  if (markerBitmap && xrSession.supportedFrameFeatures?.has('image-tracking') !== false) {
    usingImageTracking = true;
  }

  // ── 5. Hit-test fallback (tap to place) ──
  let hitTestSource = null;
  if (!usingImageTracking) {
    try {
      const htRefSpace = await xrSession.requestReferenceSpace('viewer');
      hitTestSource = await xrSession.requestHitTestSource({ space: htRefSpace });
      scanTxt.textContent = 'tap floor to place portal';
    } catch(_) {
      scanTxt.textContent = 'tracking unavailable';
    }
  }

  canvas.addEventListener('touchend', () => {
    if (lastHitPose && !usingImageTracking) {
      applyXRPoseToNode(lastHitPose.transform, portalRoot);
      markerTracked = true;
      scanRing.style.display = 'none';
    }
  }, { passive: true });
  let lastHitPose = null;

  // ── 6. Show HUD, hide splash ──
  splash.style.display = 'none';
  hud.style.display    = 'block';
  setStatus('scanning…');

  // ── 7. XR frame loop ──
  let orbT = 0;
  xrSession.requestAnimationFrame(function onXRFrame(time, frame) {
    xrSession.requestAnimationFrame(onXRFrame);

    const pose = frame.getViewerPose(xrRefSpace);
    if (!pose) return;
    camPose = pose;

    // Hit test results (Fallback)
    if (hitTestSource) {
      const hits = frame.getHitTestResults(hitTestSource);
      lastHitPose = hits.length ? hits[0].getPose(xrRefSpace) : null;
    }

    // Image Tracking Results
    if (usingImageTracking) {
      const results = frame.getImageTrackingResults();
      let trackingFound = false;

      for (const result of results) {
        if (result.trackingState === "tracked") {
          const imgPose = frame.getPose(result.imageSpace, xrRefSpace);
          if (imgPose) {
            applyXRPoseToNode(imgPose.transform, portalRoot);
            
            if (!markerTracked) {
              markerTracked = true;
              scanRing.style.display = 'none';
            }
            trackingFound = true;
            break; 
          }
        }
      }

      if (!trackingFound && markerTracked) {
        markerTracked = false;
        scanRing.style.display = 'flex';
        scanTxt.textContent = 'marker lost — keep scanning';
      }
    }

    // Update Babylon camera from XR pose
    const view = pose.views[0]; 
    updateBabylonCamera(view);

    // Animate orb
    orbT += 0.016;
    if (orbMesh) {
      orbMesh.position.y = 0.15 + Math.sin(orbT) * 0.12;
      orbMesh.rotation.y = orbT * 0.5;
    }

    // Proximity check
    if (markerTracked || (!usingImageTracking && lastHitPose)) {
      const camPos  = scene.activeCamera.position;
      const portPos = portalRoot.getAbsolutePosition()
        .add(new BABYLON.Vector3(0, CFG.portalH/2, 0));
      const dist = BABYLON.Vector3.Distance(camPos, portPos);

      if (!insidePortal && dist < CFG.enterDist)         enterPortal();
      else if (insidePortal && dist > CFG.enterDist*1.5) exitPortal();

      setStatus(`dist: ${dist.toFixed(2)}m | ${insidePortal ? 'inside ●' : 'outside ○'}`);
    }

    // Render Babylon into the XR framebuffer
    gl.bindFramebuffer(gl.FRAMEBUFFER, xrLayer.framebuffer);
    engine.beginFrame();
    scene.render();
    engine.endFrame();
  });

  xrSession.addEventListener('end', onSessionEnd);
});

// ─── SYNC BABYLON CAMERA FROM XR VIEW ─────────────────────────────────────
function updateBabylonCamera(view) {
  const cam = scene.activeCamera;
  if (!cam) return;

  const t = view.transform.position;
  cam.position.set(t.x, t.y, t.z);

  const q = view.transform.orientation;
  const bq = new BABYLON.Quaternion(q.x, q.y, q.z, q.w);
  cam.rotationQuaternion = bq;

  const proj = BABYLON.Matrix.FromArray(view.projectionMatrix);
  cam.freezeProjectionMatrix(proj);
}

// ─── APPLY XR POSE TRANSFORM TO A BABYLON NODE ────────────────────────────
function applyXRPoseToNode(transform, node) {
  const p = transform.position;
  const q = transform.orientation;
  node.position.set(p.x, p.y, p.z);
  node.rotationQuaternion = new BABYLON.Quaternion(q.x, q.y, q.z, q.w);
}

// ─── PORTAL ENTER / EXIT ───────────────────────────────────────────────────
function enterPortal() {
  insidePortal = true;
  insideBadge.style.display = 'block';
  scene.meshes.forEach(m => {
    if (m.material?.stencilFunc === BABYLON.Engine.EQUAL)
      m.material.stencilFunc = BABYLON.Engine.ALWAYS;
  });
}
function exitPortal() {
  insidePortal = false;
  insideBadge.style.display = 'none';
  scene.meshes.forEach(m => {
    if (m.material?.stencilFunc === BABYLON.Engine.ALWAYS
        && !['ap','f0','f1','f2','f3'].includes(m.name))
      m.material.stencilFunc = BABYLON.Engine.EQUAL;
  });
}

// ─── END SESSION ───────────────────────────────────────────────────────────
async function endSession() {
  try { await xrSession?.end(); } catch(_) {}
}
function onSessionEnd() {
  insidePortal = markerTracked = false;
  hud.style.display    = 'none';
  splash.style.display = 'flex';
  startBtn.disabled    = false;
  startBtn.textContent = 'START AR';
  if (engine) { engine.dispose(); engine = scene = null; }
}

function setStatus(t) { statusBar.textContent = t; }
</script>
</body>
</html>
