<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>AR Portal</title>
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    html, body { width:100%; height:100%; overflow:hidden; background:#000; font-family:monospace; }

    #renderCanvas {
      position:fixed; inset:0; width:100%; height:100%;
      display:block; touch-action:none;
    }

    /* ── SPLASH ── */
    #splash {
      position:fixed; inset:0; z-index:200;
      background:#080810;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:32px 24px;
    }
    #splash h1 { font-size:24px; letter-spacing:0.2em; color:#fff; font-weight:400; margin-bottom:4px; }
    .sub { font-size:11px; color:rgba(255,255,255,0.28); letter-spacing:0.1em; margin-bottom:32px; }
    #markerPreview {
      width:156px; height:156px; border-radius:10px; margin-bottom:10px;
      border:1.5px solid rgba(255,255,255,0.14); image-rendering:pixelated; cursor:pointer;
    }
    .hint { font-size:11px; color:rgba(255,255,255,0.35); text-align:center; line-height:1.9; margin-bottom:32px; }
    #startBtn {
      width:100%; max-width:280px; padding:18px;
      font-size:15px; font-family:monospace; letter-spacing:0.12em;
      border-radius:12px; border:none; background:#fff; color:#000;
      cursor:pointer; font-weight:700; -webkit-appearance:none;
    }
    #startBtn:active { opacity:0.7; }
    #startBtn:disabled { opacity:0.28; cursor:default; }
    #errMsg { margin-top:14px; font-size:11px; color:rgba(255,90,90,0.85); text-align:center; line-height:1.8; display:none; }

    /* ── HUD (shown during AR) ── */
    #hud { position:fixed; inset:0; z-index:100; pointer-events:none; display:none; }

    #scanRing {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      width:180px; height:180px; border-radius:50%;
      border:1.5px solid rgba(255,255,255,0.3);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:14px;
      animation:pulse 2s ease-in-out infinite;
    }
    #scanRing svg { width:48px; height:48px; opacity:0.5; }
    #scanTxt { font-size:11px; color:rgba(255,255,255,0.45); letter-spacing:0.07em; }
    @keyframes pulse {
      0%,100% { transform:translate(-50%,-50%) scale(1);    border-color:rgba(255,255,255,0.3); }
      50%      { transform:translate(-50%,-50%) scale(1.07); border-color:rgba(255,255,255,0.6); }
    }

    #statusBar {
      position:absolute; bottom:max(24px, env(safe-area-inset-bottom));
      left:50%; transform:translateX(-50%);
      background:rgba(0,0,0,0.6); color:rgba(100,240,150,0.9);
      font-size:11px; padding:9px 20px; border-radius:30px;
      letter-spacing:0.05em; white-space:nowrap; max-width:90vw;
    }

    #insideBadge {
      position:absolute; top:max(20px,env(safe-area-inset-top));
      left:50%; transform:translateX(-50%);
      color:rgba(150,210,255,0.9); font-size:12px; letter-spacing:0.1em; display:none;
    }

    #exitBtn {
      position:absolute;
      top:max(14px,env(safe-area-inset-top));
      right:max(14px,env(safe-area-inset-right));
      pointer-events:auto; background:rgba(0,0,0,0.55);
      border:1px solid rgba(255,255,255,0.2); color:#fff;
      font-family:monospace; font-size:12px; padding:11px 18px;
      border-radius:30px; cursor:pointer; letter-spacing:0.07em; -webkit-appearance:none;
    }
    #exitBtn:active { background:rgba(40,40,40,0.8); }
  </style>
</head>
<body>

<canvas id="renderCanvas"></canvas>

<div id="splash">
  <h1>AR PORTAL</h1>
  <p class="sub">babylon.js · webxr</p>
  <canvas id="markerPreview" width="256" height="256" title="Tap to download"></canvas>
  <p class="hint">Print this marker ~15 cm wide,<br>or show it on another screen.</p>
  <button id="startBtn" disabled>checking AR…</button>
  <p id="errMsg"></p>
</div>

<div id="hud">
  <div id="scanRing">
    <svg viewBox="0 0 48 48" fill="none">
      <rect x="4"  y="4"  width="12" height="3" fill="white"/>
      <rect x="4"  y="4"  width="3"  height="12" fill="white"/>
      <rect x="32" y="4"  width="12" height="3" fill="white"/>
      <rect x="41" y="4"  width="3"  height="12" fill="white"/>
      <rect x="4"  y="41" width="12" height="3" fill="white"/>
      <rect x="4"  y="32" width="3"  height="12" fill="white"/>
      <rect x="32" y="41" width="12" height="3" fill="white"/>
      <rect x="41" y="32" width="3"  height="12" fill="white"/>
    </svg>
    <span id="scanTxt">point at marker</span>
  </div>
  <div id="insideBadge">● INSIDE PORTAL</div>
  <div id="statusBar">starting…</div>
  <button id="exitBtn" onclick="endSession()">END AR</button>
</div>

<!-- Babylon core only — no extras needed -->
<script src="https://cdn.babylonjs.com/babylon.js"></script>

<script>
'use strict';

const CFG = {
  portalW: 0.80,
  portalH: 1.60,
  roomSize: 3.0,
  enterDist: 0.55,
  stencilRef: 1,
};

let engine, scene, xrSession, xrRefSpace, xrLayer;
let portalRoot, orbMesh;
let insidePortal = false;

const canvas = document.getElementById('renderCanvas');
const splash = document.getElementById('splash');
const startBtn = document.getElementById('startBtn');
const errMsg = document.getElementById('errMsg');
const hud = document.getElementById('hud');
const scanRing = document.getElementById('scanRing');
const scanTxt = document.getElementById('scanTxt');
const statusBar = document.getElementById('statusBar');
const insideBadge = document.getElementById('insideBadge');

// ─── XR CHECK ─────────────────────────────────
(async () => {
  if (!navigator.xr) return fail('No WebXR');
  if (await navigator.xr.isSessionSupported('immersive-ar')) {
    startBtn.disabled = false;
    startBtn.textContent = 'START AR';
  } else {
    fail('AR not supported');
  }
})();

function fail(msg) {
  startBtn.disabled = true;
  startBtn.textContent = 'UNAVAILABLE';
  errMsg.style.display = 'block';
  errMsg.textContent = msg;
}

// ─── BABYLON ─────────────────────────────────
function initBabylon() {
  engine = new BABYLON.Engine(canvas, true, { stencil:true, alpha:true });
  scene = new BABYLON.Scene(engine);
  scene.clearColor = new BABYLON.Color4(0,0,0,0);

  const cam = new BABYLON.UniversalCamera('cam', BABYLON.Vector3.Zero(), scene);
  scene.activeCamera = cam;

  new BABYLON.HemisphericLight('h', new BABYLON.Vector3(0,1,0), scene);

  buildPortal();
}

// ─── PORTAL ─────────────────────────────────
function mkStencilMat(color) {
  const m = new BABYLON.StandardMaterial('m', scene);
  m.emissiveColor = color;
  m.diffuseColor = color;
  m.backFaceCulling = false;
  m.stencil = true;
  m.stencilFunc = BABYLON.Engine.EQUAL;
  m.stencilFuncRef = CFG.stencilRef;
  return m;
}

function buildPortal() {
  portalRoot = new BABYLON.TransformNode('portal', scene);

  const apertureMat = new BABYLON.StandardMaterial('a', scene);
  apertureMat.disableColorWrite = true;
  apertureMat.stencil = true;
  apertureMat.stencilFunc = BABYLON.Engine.ALWAYS;
  apertureMat.stencilOpStencilDepthPass = BABYLON.Engine.REPLACE;
  apertureMat.stencilFuncRef = CFG.stencilRef;

  const ap = BABYLON.MeshBuilder.CreatePlane('ap',{width:CFG.portalW,height:CFG.portalH},scene);
  ap.material = apertureMat;
  ap.parent = portalRoot;
  ap.position.y = CFG.portalH/2;

  const room = new BABYLON.TransformNode('room', scene);
  room.parent = portalRoot;
  room.position.z = -1.5;
  room.position.y = CFG.portalH/2;

  const back = BABYLON.MeshBuilder.CreatePlane('b',{size:3},scene);
  back.position.z = -1.5;
  back.material = mkStencilMat(new BABYLON.Color3(0.1,0.2,0.4));
  back.parent = room;

  orbMesh = BABYLON.MeshBuilder.CreateSphere('orb',{diameter:0.2},scene);
  orbMesh.material = mkStencilMat(new BABYLON.Color3(0.3,0.8,1));
  orbMesh.parent = room;
  orbMesh.position.z = -1;
}

// ─── START XR ─────────────────────────────────
startBtn.addEventListener('click', async () => {

  initBabylon();

  xrSession = await navigator.xr.requestSession('immersive-ar', {
    requiredFeatures: ['hit-test','local-floor'],
    optionalFeatures: ['dom-overlay'],
    domOverlay: { root: hud }
  });

  const gl = engine._gl;
  await gl.makeXRCompatible();

  xrLayer = new XRWebGLLayer(xrSession, gl);
  await xrSession.updateRenderState({ baseLayer: xrLayer });

  xrRefSpace = await xrSession.requestReferenceSpace('local-floor');

  const viewerSpace = await xrSession.requestReferenceSpace('viewer');
  const hitTestSource = await xrSession.requestHitTestSource({ space: viewerSpace });

  splash.style.display = 'none';
  hud.style.display = 'block';

  let placed = false;
  let lastHitPose = null;

  const reticle = BABYLON.MeshBuilder.CreateTorus('r',{diameter:0.15, thickness:0.01},scene);
  reticle.material = new BABYLON.StandardMaterial('rm',scene);
  reticle.material.emissiveColor = new BABYLON.Color3(0,1,0);
  reticle.isVisible = false;

  portalRoot.setEnabled(false);

  // ✅ FIXED INPUT
  xrSession.addEventListener('select', () => {
  if (!lastHitPose || placed) return;

  const pos = lastHitPose.transform.position;

  // ✅ set position ONLY
  portalRoot.position.set(pos.x, pos.y, pos.z);

  // ✅ make portal face camera
  const camPos = scene.activeCamera.position;

  const dir = new BABYLON.Vector3(
    camPos.x - pos.x,
    0,
    camPos.z - pos.z
  ).normalize();

  const angle = Math.atan2(dir.x, dir.z);

  portalRoot.rotationQuaternion =
    BABYLON.Quaternion.FromEulerAngles(0, angle, 0);

  portalRoot.setEnabled(true);

  placed = true;
  scanRing.style.display = 'none';
  reticle.isVisible = false;

  setStatus('portal placed');
});

  xrSession.requestAnimationFrame(function loop(t, frame) {
    xrSession.requestAnimationFrame(loop);

    const pose = frame.getViewerPose(xrRefSpace);
    if (!pose) return;

    updateCamera(pose.views[0]);

    const hits = frame.getHitTestResults(hitTestSource);

    if (!placed && hits.length) {
      lastHitPose = hits[0].getPose(xrRefSpace);

      applyPose(lastHitPose.transform, reticle);
      reticle.isVisible = true;

      scanTxt.textContent = 'tap to place portal';
      setStatus('surface detected');
    }

    if (orbMesh) {
      orbMesh.rotation.y += 0.02;
    }

    if (placed) {
      const cam = scene.activeCamera.position;
      const port = portalRoot.getAbsolutePosition().add(new BABYLON.Vector3(0,CFG.portalH/2,0));
      const d = BABYLON.Vector3.Distance(cam, port);

      if (!insidePortal && d < CFG.enterDist) enterPortal();
      if (insidePortal && d > CFG.enterDist*1.5) exitPortal();
    }

    gl.bindFramebuffer(gl.FRAMEBUFFER, xrLayer.framebuffer);
    engine.beginFrame();
    scene.render();
    engine.endFrame();
  });

  xrSession.addEventListener('end', onSessionEnd);
});

// ─── HELPERS ─────────────────────────────────
function updateCamera(view){
  const cam = scene.activeCamera;
  cam.position.copyFromFloats(
    view.transform.position.x,
    view.transform.position.y,
    view.transform.position.z
  );
  cam.rotationQuaternion = new BABYLON.Quaternion(
    view.transform.orientation.x,
    view.transform.orientation.y,
    view.transform.orientation.z,
    view.transform.orientation.w
  );
}

function applyPose(t,node){
  node.position.set(t.position.x,t.position.y,t.position.z);
  node.rotationQuaternion = new BABYLON.Quaternion(
    t.orientation.x,t.orientation.y,t.orientation.z,t.orientation.w
  );
}

// ─── PORTAL STATE ────────────────────────────
function enterPortal(){
  insidePortal = true;
  insideBadge.style.display='block';
}
function exitPortal(){
  insidePortal = false;
  insideBadge.style.display='none';
}

// ─── END ─────────────────────────────────────
async function endSession(){ await xrSession?.end(); }

function onSessionEnd(){
  hud.style.display='none';
  splash.style.display='flex';
  startBtn.disabled=false;
  startBtn.textContent='START AR';
  engine?.dispose();
}

function setStatus(t){ statusBar.textContent=t; }

</script>
</body>
</html>
